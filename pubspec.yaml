name: ai_translator
description: Real-time conversation translation app - offline with whisper.cpp + NLLB-200 + fastText
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.5.0'

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_tts: ^4.0.2
  record: ^5.2.1
  path_provider: ^2.1.2
  dio: ^5.4.1
  ffi: ^2.1.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
