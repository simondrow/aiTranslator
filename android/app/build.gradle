plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.aistudio.ai_translator"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions { jvmTarget = '1.8' }

    defaultConfig {
        applicationId "com.aistudio.ai_translator"
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        ndk { abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64' }

        externalNativeBuild {
            cmake {
                // ASR: SenseVoice via sherpa_onnx; Translation: HY-MT via flutter_llama
                // Only fastText native bridge is still needed
                arguments '-DAI_BUILD_WHISPER=OFF',
                          '-DAI_BUILD_NLLB=OFF',
                          '-DAI_BUILD_FASTTEXT=ON',
                          '-DBUILD_SHARED_LIBS=ON'
                cppFlags '-O3 -funroll-loops'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path '../../native/CMakeLists.txt'
            version '3.18.1+'
        }
    }



    buildTypes {
        release { signingConfig signingConfigs.debug }
    }
}

flutter { source '../..' }

dependencies {}

