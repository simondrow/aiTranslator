plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.aistudio.ai_translator"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions { jvmTarget = '1.8' }

    defaultConfig {
        applicationId "com.aistudio.ai_translator"
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        ndk { abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64' }

        externalNativeBuild {
            cmake {
                // Whisper removed — ASR now uses SenseVoice via sherpa_onnx package
                arguments '-DAI_BUILD_WHISPER=OFF',
                          '-DAI_BUILD_NLLB=ON',
                          '-DAI_BUILD_FASTTEXT=ON',
                          '-DBUILD_SHARED_LIBS=ON'
                cppFlags '-O3 -funroll-loops'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path '../../native/CMakeLists.txt'
            version '3.18.1+'
        }
    }

    // Both onnxruntime (NLLB) and sherpa_onnx (SenseVoice) bundle libonnxruntime.so.
    // sherpa_onnx ships a newer version with OrtGetApiBase; the older one from
    // onnxruntime package lacks this symbol and causes dlopen failure.
    // pickFirst keeps whichever appears first in the merge inputs.
    packagingOptions {
        pickFirst "lib/arm64-v8a/libonnxruntime.so"
        pickFirst "lib/armeabi-v7a/libonnxruntime.so"
        pickFirst "lib/x86_64/libonnxruntime.so"
        pickFirst "lib/x86/libonnxruntime.so"
    }

    buildTypes {
        release { signingConfig signingConfigs.debug }
    }
}

flutter { source '../..' }

dependencies {}

// ============================================================
// Force sherpa_onnx's libonnxruntime.so over onnxruntime package's version.
//
// The onnxruntime Flutter package (v1.4.1) ships libonnxruntime.so 14MB
// which lacks the OrtGetApiBase symbol needed by sherpa-onnx-c-api.so.
// sherpa_onnx_android ships a newer 19MB version that is backward-compatible.
//
// gradle.projectsEvaluated runs after ALL sub-projects are fully configured,
// so the :onnxruntime project's android plugin is guaranteed to be applied.
// ============================================================
gradle.projectsEvaluated {
    def onnxProj = rootProject.findProject(':onnxruntime')
    if (onnxProj != null) {
        onnxProj.android.sourceSets.main.jniLibs.srcDirs = []
        println "[AITranslator] Cleared onnxruntime jniLibs -- using sherpa_onnx libonnxruntime.so"
    }
}
